<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Studio Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>Ad Studio Pro</h1>
  <div class="controls">
    <input type="text" id="search" placeholder="Search size or campaign...">
    <select id="campaignFilter"></select>
  </div>
</header>

<div id="grid"></div>

<div id="modal" class="modal">
  <span id="close">&times;</span>
  <iframe id="modalFrame"></iframe>
  <div class="meta" id="meta"></div>
</div>

<script src="script.js"></script>
</body>
</html>
